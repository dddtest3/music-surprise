<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>گالری لبخند</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Vazirmatn,sans-serif}
body{height:100vh;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden}
body:before,body:after{content:"";position:absolute;width:600px;height:600px;border-radius:50%;
background:radial-gradient(circle,rgba(255,255,255,.08),transparent 60%);filter:blur(60px)}
body:before{top:-220px;left:-220px} body:after{bottom:-220px;right:-220px}
.card{width:min(92vw,380px);padding:28px;border-radius:26px;background:rgba(255,255,255,.06);
backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.12);box-shadow:0 30px 80px rgba(0,0,0,.8);text-align:center}
.cover{width:150px;height:150px;border-radius:50%;overflow:hidden;margin:0 auto 18px;border:2px solid rgba(255,255,255,.2);
animation:spin 10s linear infinite;animation-play-state:paused}
.cover img{width:100%;height:100%;object-fit:cover;filter:grayscale(100%)}
@keyframes spin{to{transform:rotate(360deg)}}
h2{margin:8px 0}.sub{opacity:.65;font-size:13px;margin-bottom:18px}
.progress{height:5px;background:#333;border-radius:10px;cursor:pointer; direction:ltr}.fill{height:100%;width:0;background:#fff;border-radius:10px}
.controls{display:flex;justify-content:center;gap:16px;margin:18px 0}
button{background:#fff;color:#000;border:none;padding:10px 18px;border-radius:999px;cursor:pointer}
#player{display:none}
.footer{margin-top:24px;padding-top:16px;border-top:1px solid rgba(255,255,255,.08)}
.footer a{color:#bbb;text-decoration:none}
</style>
</head>
<body>
<div class="card">
<div id="intro">
<p class="sub">این فقط یک آهنگ نیست؛ یک خاطره است.</p>
<button onclick="start()">باز کردن</button>
</div>

<div id="player">
<div class="cover" id="cover"><img src="cover.jpg" onerror="this.src='https://picsum.photos/400'"></div>
<h2>آهنگ ویژه</h2>
<div class="sub">برای تو</div>
<div class="progress" onclick="seek(event)"><div class="fill" id="fill"></div></div>
<div class="controls">
<button onclick="toggle()">▶ / ⏸</button>
<button onclick="stopAudio()">⏹</button>
</div>
<div class="footer">
<div><strong>گالری لبخند</strong></div>
<div><a href="https://instagram.com/gallerii.labkhand" target="_blank">@gallerii.labkhand</a></div>
</div>
</div>
<audio id="audio" src="song.mp3" preload="auto"></audio>
</div>
<script>
const a=document.getElementById('audio'),f=document.getElementById('fill'),c=document.getElementById('cover');
function start(){document.getElementById('intro').style.display='none';document.getElementById('player').style.display='block';a.play();c.style.animationPlayState='running';}
function toggle(){if(a.paused){a.play();c.style.animationPlayState='running'}else{a.pause();c.style.animationPlayState='paused'}}
function stopAudio(){a.pause();a.currentTime=0;c.style.animationPlayState='paused'}
a.ontimeupdate=()=>{if(a.duration)f.style.width=(a.currentTime/a.duration*100)+'%'};
function seek(e){const r=e.currentTarget.getBoundingClientRect();a.currentTime=((e.clientX-r.left)/r.width)*a.duration;}
</script>
</body>
</html>
