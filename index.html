<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>گالری لبخند</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0c;
  --cream:#f3ede3;
  --amber:#e8a33d;
  --amber-dim:#a8763a;
  --brass:#b8a488;
  --muted:rgba(243,237,227,.5);
  --card:rgba(255,255,255,.035);
  --card-border:rgba(232,163,61,.16);
  --groove:rgba(0,0,0,.55);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Vazirmatn',sans-serif}
html,body{height:100%}
body{
  background:
    radial-gradient(ellipse 700px 500px at 15% 0%, rgba(232,163,61,.10), transparent 60%),
    radial-gradient(ellipse 700px 500px at 90% 100%, rgba(139,58,58,.10), transparent 60%),
    var(--bg);
  color:var(--cream);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  position:relative;
}
body::before{
  content:"";position:absolute;inset:0;pointer-events:none;opacity:.05;
  background-image:radial-gradient(circle, #fff 1px, transparent 1px);
  background-size:3px 3px;
}

.card{
  width:min(92vw,400px);
  padding:36px 30px 28px;
  border-radius:28px;
  background:var(--card);
  backdrop-filter:blur(22px);
  border:1px solid var(--card-border);
  box-shadow:0 40px 90px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.04);
  text-align:center;
  position:relative;
  z-index:1;
}

/* ---------- Intro ---------- */
#intro{padding:20px 4px 6px}
.eyebrow{
  display:inline-block;
  font-size:11px;letter-spacing:.14em;color:var(--amber);
  border:1px solid rgba(232,163,61,.35);
  border-radius:999px;padding:5px 14px;margin-bottom:22px;
  font-weight:500;
}
#intro h1{
  font-size:22px;font-weight:800;margin-bottom:10px;line-height:1.6;
}
#intro .sub{
  font-size:13.5px;color:var(--muted);font-weight:300;line-height:1.9;
  max-width:280px;margin:0 auto 28px;
}
.open-btn{
  background:linear-gradient(135deg,var(--amber),#c9822e);
  color:#1a1206;border:none;font-weight:700;font-size:14px;
  padding:13px 34px;border-radius:999px;cursor:pointer;
  box-shadow:0 12px 26px rgba(232,163,61,.28);
  transition:transform .25s ease, box-shadow .25s ease;
}
.open-btn:hover{transform:translateY(-2px);box-shadow:0 16px 32px rgba(232,163,61,.38)}
.open-btn:active{transform:translateY(0)}

/* ---------- Turntable ---------- */
#player{display:none}
.turntable{
  position:relative;
  width:190px;height:190px;
  margin:6px auto 22px;
}
.platter{
  width:172px;height:172px;
  border-radius:50%;
  margin:0 auto;
  background:radial-gradient(circle at 50% 50%, #1c1c1f 0%, #101012 60%, #0a0a0b 100%);
  box-shadow:0 18px 40px rgba(0,0,0,.6), inset 0 0 0 1px rgba(255,255,255,.05);
  position:relative;
}
.vinyl{
  position:absolute;inset:0;border-radius:50%;
  animation:spin 9s linear infinite;
  animation-play-state:paused;
}
.grooves{
  position:absolute;inset:0;border-radius:50%;
  background:repeating-radial-gradient(circle,
    rgba(255,255,255,.05) 0px, rgba(255,255,255,.05) 1px,
    transparent 1px, transparent 4px);
  mask-image:radial-gradient(circle, transparent 30%, #000 31%, #000 96%, transparent 97%);
}
.label{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:64px;height:64px;border-radius:50%;overflow:hidden;
  border:2px solid var(--amber-dim);
  box-shadow:0 0 0 4px #0a0a0b, 0 4px 14px rgba(0,0,0,.5);
}
.label img{width:100%;height:100%;object-fit:cover;filter:grayscale(70%) sepia(18%) brightness(.9)}
.spindle{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:7px;height:7px;border-radius:50%;background:#0a0a0b;
  box-shadow:0 0 0 1px rgba(255,255,255,.15);
}
@keyframes spin{to{transform:rotate(360deg)}}

.tonearm{
  position:absolute;top:-6px;left:-6px;
  width:70px;height:70px;
  transform-origin:12px 12px;
  transform:rotate(-30deg);
  transition:transform .7s cubic-bezier(.4,0,.2,1);
  z-index:2;
}
.tonearm.on{transform:rotate(6deg)}
.arm-base{
  position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;
  background:radial-gradient(circle,#2a2a2d,#141416);
  box-shadow:0 2px 6px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.08);
}
.arm-rod{
  position:absolute;top:11px;left:11px;width:3px;height:58px;border-radius:3px;
  background:linear-gradient(#3a3a3e,#1a1a1c);
  transform-origin:top center;
  box-shadow:0 1px 3px rgba(0,0,0,.4);
}
.arm-head{
  position:absolute;top:60px;left:6px;width:13px;height:8px;border-radius:2px;
  background:linear-gradient(#3a3a3e,#1a1a1c);
}

/* ---------- Meta ---------- */
.meta h2{font-size:19px;font-weight:700;margin-bottom:4px;letter-spacing:.01em}
.meta .sub{font-size:12.5px;color:var(--muted);font-weight:300;margin-bottom:22px}

/* ---------- Timeline ---------- */
.timeline{display:flex;align-items:center;gap:10px;margin-bottom:22px;direction:ltr}
.time{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:32px}
.progress{
  flex:1;height:4px;border-radius:10px;background:rgba(255,255,255,.1);
  cursor:pointer;position:relative;
}
.fill{
  height:100%;width:0;border-radius:10px;
  background:linear-gradient(90deg,var(--amber-dim),var(--amber));
  position:relative;
}
.knob{
  position:absolute;top:50%;left:0%;width:11px;height:11px;border-radius:50%;
  background:var(--cream);transform:translate(-50%,-50%);
  box-shadow:0 0 0 3px rgba(232,163,61,.25);
  pointer-events:none;
}

/* ---------- Controls ---------- */
.controls{display:flex;justify-content:center;align-items:center;gap:14px;margin-bottom:26px}
.controls button{
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .2s ease, opacity .2s ease;
}
.play-btn{
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,var(--amber),#c9822e);
  box-shadow:0 12px 26px rgba(232,163,61,.3);
}
.play-btn svg{fill:#1a1206}
.stop-btn{
  width:42px;height:42px;border-radius:50%;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
}
.stop-btn svg{fill:var(--cream)}
.controls button:hover{transform:translateY(-2px)}
.controls button:active{transform:translateY(0)}

/* ---------- Footer ---------- */
.footer{padding-top:18px;border-top:1px solid rgba(255,255,255,.07)}
.footer .brand{font-size:13px;font-weight:700;letter-spacing:.02em;margin-bottom:6px}
.footer a{
  display:inline-flex;align-items:center;gap:6px;
  color:var(--brass);text-decoration:none;font-size:12.5px;
  transition:color .2s ease;
}
.footer a:hover{color:var(--amber)}
</style>
</head>
<body>
<div class="card">

  <div id="intro">
    <span class="eyebrow">یک هدیه‌ی صوتی</span>
    <h1>این فقط یک آهنگ نیست؛<br>یک خاطره است</h1>
    <p class="sub">صفحه رو لمس کن تا بازوی گرام روی صفحه بشینه و خاطره شروع بشه.</p>
    <button class="open-btn" onclick="start()">پخش خاطره</button>
  </div>

  <div id="player">
    <div class="turntable">
      <div class="platter">
        <div class="vinyl" id="vinyl">
          <div class="grooves"></div>
          <div class="label"><img src="cover.jpg" onerror="this.src='https://picsum.photos/200'" alt=""></div>
        </div>
        <div class="spindle"></div>
      </div>
      <div class="tonearm" id="tonearm">
        <div class="arm-rod"></div>
        <div class="arm-head"></div>
        <div class="arm-base"></div>
      </div>
    </div>

    <div class="meta">
      <h2>آهنگ ویژه</h2>
      <div class="sub">برای تو</div>
    </div>

    <div class="timeline">
      <span class="time" id="curTime">0:00</span>
      <div class="progress" id="progressBar" onclick="seek(event)">
        <div class="fill" id="fill"><div class="knob" id="knob"></div></div>
      </div>
      <span class="time" id="durTime">0:00</span>
    </div>

    <div class="controls">
      <button class="stop-btn" onclick="stopAudio()" aria-label="توقف">
        <svg width="14" height="14" viewBox="0 0 14 14"><rect x="1" y="1" width="12" height="12" rx="2"/></svg>
      </button>
      <button class="play-btn" id="playBtn" onclick="toggle()" aria-label="پخش">
        <svg id="playIcon" width="20" height="20" viewBox="0 0 20 20"><path d="M6 4l11 6-11 6V4z"/></svg>
        <svg id="pauseIcon" width="20" height="20" viewBox="0 0 20 20" style="display:none"><rect x="5" y="4" width="4" height="12" rx="1"/><rect x="11" y="4" width="4" height="12" rx="1"/></svg>
      </button>
      <div style="width:42px"></div>
    </div>

    <div class="footer">
      <div class="brand">گالری لبخند</div>
      <a href="https://instagram.com/gallerii.labkhand" target="_blank" rel="noopener">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1"/></svg>
        gallerii.labkhand
      </a>
    </div>

    <audio id="audio" src="song.mp3" preload="auto"></audio>
  </div>
</div>

<script>
const a = document.getElementById('audio');
const fill = document.getElementById('fill');
const vinyl = document.getElementById('vinyl');
const tonearm = document.getElementById('tonearm');
const playIcon = document.getElementById('playIcon');
const pauseIcon = document.getElementById('pauseIcon');
const curTime = document.getElementById('curTime');
const durTime = document.getElementById('durTime');

function fmt(t){
  if(!isFinite(t)) return '0:00';
  const m = Math.floor(t/60), s = Math.floor(t%60);
  return m + ':' + String(s).padStart(2,'0');
}

function setPlayingUI(playing){
  vinyl.style.animationPlayState = playing ? 'running' : 'paused';
  tonearm.classList.toggle('on', playing);
  playIcon.style.display = playing ? 'none' : 'block';
  pauseIcon.style.display = playing ? 'block' : 'none';
}

function start(){
  document.getElementById('intro').style.display = 'none';
  document.getElementById('player').style.display = 'block';
  a.play();
  setPlayingUI(true);
}

function toggle(){
  if(a.paused){ a.play(); setPlayingUI(true); }
  else { a.pause(); setPlayingUI(false); }
}

function stopAudio(){
  a.pause();
  a.currentTime = 0;
  setPlayingUI(false);
}

a.onloadedmetadata = () => { durTime.textContent = fmt(a.duration); };
a.ontimeupdate = () => {
  if(a.duration){
    fill.style.width = (a.currentTime / a.duration * 100) + '%';
    curTime.textContent = fmt(a.currentTime);
  }
};
a.onended = () => setPlayingUI(false);

function seek(e){
  const r = e.currentTarget.getBoundingClientRect();
  const ratio = Math.min(Math.max((e.clientX - r.left) / r.width, 0), 1);
  if(a.duration) a.currentTime = ratio * a.duration;
}
</script>
</body>
</html>
