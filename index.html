<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Vazirmatn,sans-serif;
}

body{
  height:100vh;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  color:white;
}

/* cinematic light */
body::before,
body::after{
  content:"";
  position:absolute;
  width:600px;
  height:600px;
  background:radial-gradient(circle,rgba(255,255,255,0.08),transparent 60%);
  filter:blur(60px);
}

body::before{ top:-200px; left:-200px; }
body::after{ bottom:-200px; right:-200px; }

/* INTRO */
.intro{
  position:absolute;
  width:90%;
  max-width:420px;
  padding:35px;
  text-align:center;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(25px);
  border-radius:25px;
  animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

h1{
  font-size:20px;
}

p{
  margin-top:10px;
  font-size:13px;
  opacity:0.7;
  line-height:1.8;
}

button{
  margin-top:25px;
  padding:12px 25px;
  border:none;
  border-radius:40px;
  background:white;
  color:black;
  font-weight:600;
  cursor:pointer;
}

/* PLAYER */
.player{
  display:none;
  width:360px;
  padding:25px;
  border-radius:25px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(22px);
  text-align:center;
  box-shadow:0 30px 80px rgba(0,0,0,0.9);
}

.cover{
  width:140px;
  height:140px;
  margin:0 auto 20px;
  border-radius:50%;
  overflow:hidden;
  border:2px solid rgba(255,255,255,0.2);
  animation:spin 10s linear infinite;
  animation-play-state:paused;
}

.cover img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:grayscale(100%);
}

@keyframes spin{
  from{transform:rotate(0);}
  to{transform:rotate(360deg);}
}

.title{
  font-size:18px;
  font-weight:700;
}

.sub{
  font-size:12px;
  opacity:0.6;
  margin-bottom:15px;
}

.bar{
  width:100%;
  height:4px;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
  cursor:pointer;
}

.fill{
  height:100%;
  width:0%;
  background:white;
}

.controls{
  margin-top:15px;
  display:flex;
  justify-content:center;
  gap:20px;
}

button.ctrl{
  background:none;
  color:white;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <h1>🎁 یک پیام ویژه</h1>
  <p>
    این فقط یک آهنگ نیست...<br>
    یک لحظه‌ست که فقط برای تو ساخته شده.
  </p>
  <button onclick="start()">باز کردن</button>
</div>

<!-- PLAYER -->
<div class="player" id="player">

  <div class="cover" id="cover">
    <img src="https://picsum.photos/300">
  </div>

  <div class="title">آهنگ ویژه</div>
  <div class="sub">نسخه سینمایی</div>

  <div class="bar" onclick="seek(event)">
    <div class="fill" id="fill"></div>
  </div>

  <div class="controls">
    <button class="ctrl" onclick="toggle()">▶ / ⏸</button>
    <button class="ctrl" onclick="stop()">⏹</button>
  </div>

</div>

<audio id="audio" src="song.mp3" preload="auto"></audio>

<script>

const audio = document.getElementById("audio");
const fill = document.getElementById("fill");
const cover = document.getElementById("cover");

let ready = false;

// مهم: unlock صدا برای موبایل
function unlock(){
  if(ready) return;

  audio.play().then(()=>{
    audio.pause();
    audio.currentTime = 0;
    ready = true;
  }).catch(()=>{});
}

function start(){
  unlock(); // خیلی مهم برای iPhone

  document.getElementById("intro").style.display="none";
  document.getElementById("player").style.display="block";

  audio.play();
  cover.style.animationPlayState="running";
}

function toggle(){
  if(audio.paused){
    audio.play();
    cover.style.animationPlayState="running";
  }else{
    audio.pause();
    cover.style.animationPlayState="paused";
  }
}

function stop(){
  audio.pause();
  audio.currentTime=0;
  cover.style.animationPlayState="paused";
}

audio.ontimeupdate = ()=>{
  let p = (audio.currentTime / audio.duration) * 100;
  fill.style.width = p + "%";
};

function seek(e){
  let w = e.currentTarget.clientWidth;
  let x = e.offsetX;
  audio.currentTime = (x/w)*audio.duration;
}

</script>

</body>
</html>
